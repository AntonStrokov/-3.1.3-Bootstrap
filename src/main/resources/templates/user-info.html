<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; background-color: #f8f9fa; margin: 0; }
        .sidebar { width: 240px; background-color: #ffffff; min-height: calc(100vh - 56px); border-right: 1px solid #dee2e6; padding-top: 15px; }
        .sidebar .nav-link { border-radius: 0; margin: 0; color: #0d6efd; padding: 12px 20px; }
        .sidebar .nav-link.active { background-color: #0d6efd !important; color: #ffffff !important; }
        .content { flex-grow: 1; padding: 20px 30px; }
        .card-header { background-color: #f7f7f7; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="bg-dark p-2 d-flex justify-content-between align-items-center shadow">
    <span class="fw-bold fs-5 text-white px-3">
        <strong th:text="${currentUser.email}">user@mail.ru</strong>
        <span class="fw-normal text-secondary ms-1">with roles:</span>
        <span class="fw-normal text-white ms-1" th:each="roleName : ${#lists.sort(currentUser.roles.![name])}"
              th:text="${#strings.replace(roleName, 'ROLE_', '') + ' '}"></span>
    </span>
    <form th:action="@{/logout}" method="POST" class="m-0">
        <button class="btn btn-link text-secondary text-decoration-none" type="submit">Logout</button>
    </form>
</div>

<div class="d-flex">
    <div class="sidebar shadow-sm">
        <div class="nav flex-column nav-pills mt-3">
            <button class="nav-link active text-start ps-4">User</button>
        </div>
    </div>

    <div class="content">
        <h1 class="fw-bold mb-4">User information-page</h1>
        <div class="card rounded-0 shadow-sm border">
            <div class="card-header border-bottom p-3">About user</div>
            <div class="card-body p-4 bg-white">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr class="border-top">
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th>Role</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td th:text="${currentUser.id}"></td>
                        <td th:text="${currentUser.name}"></td>
                        <td th:text="${currentUser.lastName}"></td>
                        <td th:text="${currentUser.age}"></td>
                        <td th:text="${currentUser.email}"></td>
                        <td>
                            <span th:each="roleName : ${#lists.sort(currentUser.roles.![name])}"
                                  th:text="${#strings.replace(roleName, 'ROLE_', '') + ' '}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
