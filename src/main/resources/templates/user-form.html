<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f8f9fa;
        }
        .main-area { flex-grow: 1; display: flex; }
        .sidebar { width: 220px; background-color: #ffffff; }
        .sidebar .list-group-item { border: none; border-radius: 0; color: #0d6efd; }
        .sidebar .list-group-item:hover { background-color: #0d6efd; color: #ffffff; }
        .sidebar .list-group-item.active { background-color: #0d6efd; color: #ffffff; }
        .sidebar .list-group-item:first-child { margin-top: 14px; }
        .content { flex-grow: 1; padding: 20px; }
        .all-users-header {
            border: 1px solid #dee2e6; border-radius: 0;
            background-color: #e9ecef; padding: 10px 15px;
            font-weight: bold; font-size: 1.25rem; margin-bottom: 0;
        }
        .nav-text-link {
            color: #0d6efd; text-decoration: none;
            padding: 6px 12px; border: 1px solid transparent;
            border-radius: 0; transition: all 0.2s ease;
        }
        .nav-text-link:hover { background-color: #f8f9fa; border-color: #dee2e6; color: #495057; }
        .nav-text-link.active { background-color: #ffffff; border-color: #dee2e6; color: #6c757d; font-weight: 600; }
        .form-label { display: block; text-align: center; }
        .btn-compact { width: auto; padding: 6px 16px; }
    </style>
</head>
<body>

<!-- Верхняя строка -->
<div class="bg-dark p-2 d-flex justify-content-between align-items-center">
    <span class="fw-bold fs-5 text-white">
        <span th:text="${currentUser.email}"></span>
        with roles:
        <span th:if="${#lists.contains(currentUser.roles.![name], 'ROLE_ADMIN')}">ADMIN </span>
        <span th:if="${#lists.contains(currentUser.roles.![name], 'ROLE_USER')}">USER </span>
    </span>
    <form th:action="@{/logout}" method="POST" class="m-0">
        <button class="btn btn-sm text-secondary" style="background-color: transparent; border: none;">Logout</button>
    </form>
</div>

<div class="main-area">
    <!-- Sidebar -->
    <div class="sidebar p-0 border-end">
        <div class="list-group list-group-flush">
            <a class="list-group-item list-group-item-action active">Admin</a>
            <a class="list-group-item list-group-item-action" th:href="@{/user}">User</a>
        </div>
    </div>

    <!-- Content -->
    <div class="content flex-grow-1">
        <h1 class="mb-4 fw-bold">Admin panel</h1>

        <!-- Навигация -->
        <div class="btn-group mb-3" role="group">
            <a class="nav-text-link" th:href="@{/admin}" th:classappend="${page == 'users'} ? ' active' : ''">User table</a>
            <a class="nav-text-link active" th:classappend="${page == 'newuser'} ? ' active' : ''">New user</a>
        </div>

        <!-- Серая полоса -->
        <div class="all-users-header">Add new user</div>

        <!-- Белое окно с формой -->
        <div class="card shadow-sm">
            <div class="card-body d-flex justify-content-center">
                <div class="col-md-4">
                    <form th:action="@{${user.id} != null ? '/admin/update' : '/admin/add'}"
                          method="post" th:object="${user}" novalidate>

                        <input type="hidden" th:if="${user.id != null}" th:field="*{id}" />

                        <!-- First Name -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">First name</label>
                            <input type="text" class="form-control" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <!-- Last Name -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Last name</label>
                            <input type="text" class="form-control" th:field="*{lastName}"
                                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" th:field="*{email}"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <!-- Age -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Age</label>
                            <input type="number" class="form-control" th:field="*{age}"
                                   th:classappend="${#fields.hasErrors('age')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control" th:field="*{password}"
                                   autocomplete="new-password"
                                   th:placeholder="${user.id != null ? 'Leave blank to keep old' : ''}"
                                   th:required="${user.id == null}" />
                        </div>

                        <!-- Roles -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Roles</label>
                            <select class="form-select" name="roleIds" multiple size="2">
                                <option th:each="role : ${allRoles}"
                                        th:value="${role.id}"
                                        th:text="${#strings.replace(role.name, 'ROLE_', '')}"
                                        th:selected="${user.roles != null and #lists.contains(user.roles.![id], role.id)}">
                                </option>
                            </select>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex flex-column align-items-center gap-2 mt-3">
                            <button type="submit" class="btn btn-success fw-bold btn-compact">Add new user</button>
                            <a th:href="@{/admin}" class="btn btn-outline-secondary fw-bold btn-compact">Back to list</a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
