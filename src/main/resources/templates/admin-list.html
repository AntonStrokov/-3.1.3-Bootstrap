<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f8f9fa;
        }
        .main-area {
            flex-grow: 1;
            display: flex;
        }
        .sidebar {
            width: 220px;
            background-color: #ffffff;
        }
        .sidebar .list-group-item {
            border: none;
            border-radius: 0;
            color: #0d6efd;
        }
        .sidebar .list-group-item:hover {
            background-color: #0d6efd;
            color: #ffffff;
        }
        .sidebar .list-group-item.active {
            background-color: #0d6efd;
            color: #ffffff;
        }
        .sidebar .list-group-item:first-child {
            margin-top: 14px;
        }
        .content {
            flex-grow: 1;
            padding: 20px;
        }
        .table thead {
            background-color: #0d6efd;
            color: #ffffff;
        }
        .table td, .table th {
            padding: 12px 16px;
        }
        .btn-edit {
            background-color: #0dcaf0;
            color: #fff;
        }
        .btn-edit:hover {
            background-color: #0bbce0;
            color: #fff;
        }
        .all-users-header {
            border: 1px solid #dee2e6;
            border-radius: 0;
            background-color: #e9ecef;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 1.25rem;
            margin-bottom: 0;
        }
        .nav-text-link {
            color: #0d6efd;
            text-decoration: none;
            padding: 6px 12px;
            border: 1px solid transparent;
            border-radius: 0;
            transition: all 0.2s ease;
        }
        .nav-text-link:hover {
            background-color: #f8f9fa;
            border-color: #dee2e6;
            color: #495057;
        }
        .nav-text-link.active {
            background-color: #ffffff;   /* белый фон */
            border-color: #dee2e6;       /* бледно-серая рамка */
            color: #6c757d;              /* серый текст */
            font-weight: 600;            /* акцент */
        }
    </style>
</head>
<body>

<!-- Верхняя строка -->
<div class="bg-dark p-2 d-flex justify-content-between align-items-center">
    <span class="fw-bold fs-5 text-white">
        <span th:text="${currentUser.email}"></span>
        with roles:
        <span th:if="${#lists.contains(currentUser.roles.![name], 'ROLE_ADMIN')}">ADMIN </span>
        <span th:if="${#lists.contains(currentUser.roles.![name], 'ROLE_USER')}">USER </span>
    </span>
    <form th:action="@{/logout}" method="POST" class="m-0">
        <button class="btn btn-sm text-secondary" style="background-color: transparent; border: none;">
            Logout
        </button>
    </form>
</div>

<!-- Основная часть -->
<div class="main-area">
    <!-- Sidebar -->
    <div class="sidebar p-0 border-end">
        <div class="list-group list-group-flush">
            <a class="list-group-item list-group-item-action active" href="#users" data-bs-toggle="tab">Admin</a>
            <a class="list-group-item list-group-item-action" th:href="@{/user}">User</a>
        </div>
    </div>

    <!-- Content -->
    <div class="content flex-grow-1">
        <div class="tab-content">

            <!-- Admin panel -->
            <div class="tab-pane fade show active" id="users">
                <h1 class="mb-4 fw-bold">Admin panel</h1>

                <!-- Кнопки рядом -->
                <div class="btn-group mb-3" role="group">
                    <a class="nav-text-link"
                       th:classappend="${page == 'users'} ? ' active' : ''"
                       href="#users" data-bs-toggle="tab">User table</a>
                    <a class="nav-text-link"
                       th:classappend="${page == 'newuser'} ? ' active' : ''"
                       th:href="@{/admin/add}">New user</a>
                </div>

                <div class="all-users-header">
                    All users
                </div>

                <div class="card shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle mb-0">
                            <thead>
                            <tr>
                                <th class="text-center">ID</th>
                                <th class="text-center">Name</th>
                                <th class="text-center">Age</th>
                                <th class="text-center">Email</th>
                                <th class="text-start">Roles</th>
                                <th class="text-center">Edit</th>
                                <th class="text-center">Delete</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td class="text-center" th:text="${user.id}"></td>
                                <td class="text-center" th:text="${user.name}"></td>
                                <td class="text-center" th:text="${user.age}"></td>
                                <td class="text-center" th:text="${user.email}"></td>
                                <td class="text-start">
                                    <!-- Сначала ADMIN -->
                                    <span th:if="${#lists.contains(user.roles.![name], 'ROLE_ADMIN')}">ADMIN </span>
                                    <!-- Потом USER -->
                                    <span th:if="${#lists.contains(user.roles.![name], 'ROLE_USER')}">USER </span>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/admin/edit(id=${user.id})}" class="btn btn-sm btn-edit">Edit</a>
                                </td>
                                <td class="text-center">
                                    <form th:action="@{/admin/delete}" method="post" class="m-0">
                                        <input type="hidden" th:name="id" th:value="${user.id}"/>
                                        <button type="submit" class="btn btn-sm btn-danger"
                                                onclick="return confirm('Are you sure?')">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="7" class="text-center py-4 text-muted">No users found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
