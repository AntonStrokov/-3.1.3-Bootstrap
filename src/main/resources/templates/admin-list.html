<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; background-color: #f8f9fa; margin: 0; }
        .sidebar { width: 240px; background-color: #ffffff; min-height: calc(100vh - 56px); border-right: 1px solid #dee2e6; padding-top: 15px; }
        .sidebar .list-group-item { border: none; margin: 0; border-radius: 0; color: #0d6efd; padding: 12px 20px; }
        .sidebar .list-group-item.active { background-color: #0d6efd; color: #ffffff; border-radius: 0; }
        .content { flex-grow: 1; padding: 20px 30px; }
        .card-header { background-color: #f7f7f7; font-weight: bold; font-size: 1.2rem; }
        .centered-form-container { width: 300px; margin: 0 auto; text-align: center; }
        .form-label { font-weight: bold; margin-top: 10px; margin-bottom: 2px; display: block; }
        .nav-tabs .nav-link { border-radius: 0.375rem 0.375rem 0 0; }
        .tab-content { border: 1px solid #dee2e6; border-top: none; border-radius: 0 0 0.375rem 0.375rem; }
    </style>
</head>
<body>

<div class="bg-dark p-2 d-flex justify-content-between align-items-center shadow">
    <span class="fw-bold fs-5 text-white px-3">
        <strong th:text="${currentUser.email}">admin@mail.ru</strong>
        <span class="fw-normal text-secondary ms-1">with roles:</span>
        <span class="fw-normal text-white ms-1" th:each="roleName : ${#lists.sort(currentUser.roles.![name])}"
              th:text="${#strings.replace(roleName, 'ROLE_', '') + ' '}"></span>
    </span>
    <form th:action="@{/logout}" method="POST" class="m-0">
        <button class="btn btn-link text-secondary text-decoration-none" type="submit">Logout</button>
    </form>
</div>

<div class="d-flex">
    <div class="sidebar shadow-sm">
        <div class="list-group list-group-flush mt-3">
            <a class="list-group-item list-group-item-action active" th:href="@{/admin}">Admin</a>
            <a class="list-group-item list-group-item-action" th:href="@{/user}">User</a>
        </div>
    </div>

    <div class="content">
        <h1 class="fw-bold">Admin panel</h1>
        <ul class="nav nav-tabs mt-3" id="adminTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="table-tab" data-bs-toggle="tab" data-bs-target="#usersTable" type="button" role="tab">Users table</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="new-user-tab" data-bs-toggle="tab" data-bs-target="#newUserTab" type="button" role="tab">New User</button>
            </li>
        </ul>

        <div class="tab-content border rounded-bottom bg-white shadow-sm">
            <div class="tab-pane fade show active" id="usersTable" role="tabpanel">
                <div class="card-header border-bottom p-3">All users</div>
                <div class="p-4">
                    <table class="table table-striped align-middle">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Edit</th>
                            <th>Delete</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.name}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>
                            <td>
                                <span th:each="roleName : ${#lists.sort(user.roles.![name])}"
                                      th:text="${#strings.replace(roleName, 'ROLE_', '') + ' '}"></span>
                            </td>
                            <td>
                                <button class="btn btn-info btn-sm text-white" data-bs-toggle="modal" th:data-bs-target="'#editModal' + ${user.id}">Edit</button>
                            </td>
                            <td>
                                <button class="btn btn-danger btn-sm" data-bs-toggle="modal" th:data-bs-target="'#deleteModal' + ${user.id}">Delete</button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="tab-pane fade" id="newUserTab" role="tabpanel">
                <div class="card-header border-bottom p-3">Add new user</div>
                <div class="p-5 d-flex justify-content-center bg-white">
                    <div class="centered-form-container">
                        <form th:action="@{/admin/add}" th:object="${newUser}" method="post" novalidate>
                            <input type="text" name="prevent_autofill" style="display:none;" tabindex="-1">
                            <input type="password" name="password_fake" style="display:none;" tabindex="-1">

                            <label class="form-label">First name</label>
                            <input type="text" class="form-control text-start" th:field="*{name}" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{name}"></div>

                            <label class="form-label">Last name</label>
                            <input type="text" class="form-control text-start" th:field="*{lastName}" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{lastName}"></div>

                            <label class="form-label">Age</label>
                            <input type="number" class="form-control text-start" th:field="*{age}" th:errorclass="is-invalid" step="1">
                            <div class="invalid-feedback" th:errors="*{age}"></div>

                            <label class="form-label">Email</label>
                            <input type="email" class="form-control text-start" th:field="*{email}" th:errorclass="is-invalid" autocomplete="one-time-code" onfocus="this.removeAttribute('readonly');" readonly>
                            <div class="invalid-feedback" th:errors="*{email}"></div>

                            <label class="form-label">Password</label>
                            <input type="password" class="form-control text-start" th:field="*{password}" th:errorclass="is-invalid">
                            <div class="invalid-feedback" th:errors="*{password}"></div>

                            <label class="form-label">Role</label>
                            <select class="form-select text-start" name="roleIds" multiple size="2" th:classappend="${#fields.hasErrors('roles')} ? 'is-invalid' : ''">
                                <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${#strings.replace(role.name, 'ROLE_', '')}"></option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{roles}"></div>

                            <button type="submit" class="btn btn-success btn-lg mt-4 px-4 fw-bold">Add new user</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:each="user : ${users}">
    <div class="modal fade" th:id="'editModal' + ${user.id}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/update}" method="post" novalidate>
                    <input type="hidden" name="id" th:value="${user.id}">
                    <div class="modal-body text-center">
                        <div class="centered-form-container">
                            <label class="form-label">ID</label>
                            <input type="text" class="form-control bg-light text-start" th:value="${user.id}" disabled>

                            <label class="form-label">First name</label>
                            <input type="text" class="form-control text-start" name="name" th:value="${errorUser != null && errorUser.id == user.id ? errorUser.name : user.name}" th:classappend="${errorUser != null && errorUser.id == user.id && #fields.hasErrors('user.name')} ? 'is-invalid' : ''">

                            <label class="form-label">Last name</label>
                            <input type="text" class="form-control text-start" name="lastName" th:value="${errorUser != null && errorUser.id == user.id ? errorUser.lastName : user.lastName}" th:classappend="${errorUser != null && errorUser.id == user.id && #fields.hasErrors('user.lastName')} ? 'is-invalid' : ''">

                            <label class="form-label">Age</label>
                            <input type="number" class="form-control text-start" name="age" step="1" th:value="${errorUser != null && errorUser.id == user.id ? errorUser.age : user.age}" th:classappend="${errorUser != null && errorUser.id == user.id && #fields.hasErrors('user.age')} ? 'is-invalid' : ''">

                            <label class="form-label">Email</label>
                            <input type="email" class="form-control text-start" name="email" th:value="${errorUser != null && errorUser.id == user.id ? errorUser.email : user.email}" th:classappend="${errorUser != null && errorUser.id == user.id && #fields.hasErrors('user.email')} ? 'is-invalid' : ''">

                            <label class="form-label">Password</label>
                            <input type="password" class="form-control text-start" name="password">

                            <label class="form-label">Role</label>
                            <select class="form-select text-start" name="roleIds" multiple size="2">
                                <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${#strings.replace(role.name, 'ROLE_', '')}" th:selected="${user.roles.contains(role)}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Edit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" th:id="'deleteModal' + ${user.id}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Delete user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/delete}" method="post">
                    <input type="hidden" name="id" th:value="${user.id}">
                    <div class="modal-body text-center">
                        <div class="centered-form-container">
                            <label class="form-label">ID</label><input type="text" class="form-control bg-light text-start" th:value="${user.id}" disabled>
                            <label class="form-label">First name</label><input type="text" class="form-control bg-light text-start" th:value="${user.name}" disabled>
                            <label class="form-label">Last name</label><input type="text" class="form-control bg-light text-start" th:value="${user.lastName}" disabled>
                            <label class="form-label">Age</label><input type="text" class="form-control bg-light text-start" th:value="${user.age}" disabled>
                            <label class="form-label">Email</label><input type="text" class="form-control bg-light text-start" th:value="${user.email}" disabled>
                            <label class="form-label">Role</label>
                            <select class="form-select bg-light text-start" multiple disabled size="2">
                                <option th:each="roleName : ${#lists.sort(user.roles.![name])}" th:text="${#strings.replace(roleName, 'ROLE_', '')}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        // 1. Вкладка
        const activeTab = [[${activeTab}]];
        if (activeTab === 'newuser') {
            const tabEl = document.querySelector('#new-user-tab');
            if (tabEl) new bootstrap.Tab(tabEl).show();
        }

        // 2. Модалка
        /*[# th:if="${errorUser != null}"]*/
        const modalElement = document.getElementById('editModal' + [[${errorUser.id}]]);
        if (modalElement) new bootstrap.Modal(modalElement).show();
        /*[/]*/

        // 3. Очистка автозаполнения
        setTimeout(() => {
            const form = document.querySelector('#newUserTab form');
            if (form && activeTab !== 'newuser') {
                form.querySelectorAll('input:not([type="hidden"])').forEach(i => { i.value = ''; i.defaultValue = ''; });
            }
        }, 100);

        // 4. Сброс формы
        const btn = document.querySelector('#new-user-tab');
        if (btn) btn.addEventListener('shown.bs.tab', () => {
            if (!document.querySelector('#newUserTab .is-invalid')) {
                const f = document.querySelector('#newUserTab form');
                if (f) f.reset();
            }
        });
    });
</script>
</body>
</html>
